name: Deploy Web (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'urban_tree/**'
      - '.github/workflows/deploy-vercel.yml'
      - 'vercel.json'
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production web
    if: github.event_name == 'workflow_dispatch' || vars.CI_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban_tree
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (remote Flutter build)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_ENV: prod
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npm install --global vercel@latest
          vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
