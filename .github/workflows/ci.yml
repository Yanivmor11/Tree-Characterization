name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urban_tree
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  web-build:
    name: Web build smoke
    runs-on: ubuntu-latest
    needs: flutter
    defaults:
      run:
        working-directory: urban_tree
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter build web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=https://ci-placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key \
            --dart-define=APP_ENV=prod \
            --dart-define=BLOCK_SUBMIT_IF_LOW_ACCURACY=false
