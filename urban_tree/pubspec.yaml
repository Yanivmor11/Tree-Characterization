  share_plus: ^10.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  sensors_plus: ^6.1.1
  image: ^4.5.4
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
